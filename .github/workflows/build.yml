name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Fetching Morphe CLI (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest > cli_api.json
          
          CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$CLI_URL" ]; then
            CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          echo "Downloading CLI from: $CLI_URL"
          wget -qO tools/cli.jar "$CLI_URL"
          
          echo "Fetching Morphe Patches (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest > patches_api.json
          
          # Smart Search: .jar -> .rvp -> .mpp -> Any other file (except .json)
          PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.rvp" | head -n 1)
          fi
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.mpp" | head -n 1)
          fi
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          if [ -z "$PATCHES_URL" ]; then 
            echo "Error: Patches file not found!"
            exit 1
          fi
          
          echo "Downloading Patches from: $PATCHES_URL"
          wget -qO tools/patches.jar "$PATCHES_URL"
          
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Downloaded tools are empty!"; exit 1; 
          fi
          echo "Stable Tools verified successfully!"

      - name: Download Original APKs
        run: |
          mkdir -p apks
          
          echo "Fetching latest APK directory from Archive.org (jhc-apks)..."
          curl -sL "https://archive.org/metadata/jhc-apks" > jhc_metadata.json
          
          YT_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*\.apk$' | sort -V | tail -n 1)
          if [ -z "$YT_PATH" ]; then echo "Error: YouTube APK directory me nahi mila!"; exit 1; fi
          
          YTM_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*\.apk$' | sort -V | tail -n 1)
          if [ -z "$YTM_PATH" ]; then echo "Error: YT Music APK directory me nahi mila!"; exit 1; fi
          
          echo "Found Latest YouTube: $YT_PATH"
          echo "Found Latest YT Music: $YTM_PATH"
          
          echo "Downloading YouTube APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YT_PATH" -o apks/youtube.apk
          
          echo "Downloading YT Music APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YTM_PATH" -o apks/ytmusic.apk
          
          YT_SIZE=$(stat -c%s "apks/youtube.apk" 2>/dev/null || echo 0)
          echo "Downloaded YouTube Size: $YT_SIZE bytes"
          
          if [ "$YT_SIZE" -lt 10000000 ]; then 
            echo "Error: YouTube APK download failed or file is corrupted!"
            exit 1
          fi
          echo "Original APKs dynamically downloaded successfully!"

      - name: Build Non-Root APKs
        run: |
          echo "Building YouTube Non-Root..."
          java -jar tools/cli.jar patch --patches tools/patches.jar -o YouTube-NonRoot.apk apks/youtube.apk
          
          echo "Building YT Music Non-Root..."
          java -jar tools/cli.jar patch --patches tools/patches.jar -o YTMusic-NonRoot.apk apks/ytmusic.apk

      - name: Build Root APKs (For Magisk)
        run: |
          # Declare a Bash array for dynamic exclude arguments
          declare -a EXCLUDE_ARGS=()
          
          echo "Scanning patches to dynamically exclude MicroG RE/GmsCore/Custom Package related patches..."
          
          # Failsafe Patch Listing (tries multiple parameters to never exit with code 2)
          if ! java -jar tools/cli.jar list-patches --patches tools/patches.jar > patches_list.txt 2>/dev/null; then
            if ! java -jar tools/cli.jar list-patches -p tools/patches.jar > patches_list.txt 2>/dev/null; then
              java -jar tools/cli.jar list-patches -b tools/patches.jar > patches_list.txt 2>/dev/null || echo "list-patches failed" > patches_list.txt
            fi
          fi
          
          # Read list and add any MicroG-RE/GmsCore/GMS/Package Name related patches to array with '-d' (to disable them)
          while IFS= read -r line; do
            if echo "$line" | grep -qiE "gmscore|microg|package name|custom branding|custom package|gms"; then
              CLEAN_NAME=$(echo "$line" | sed -E 's/^(INFO: |Name: |- |Patch: |  Name: )//I' | sed -E 's/ \((experimental|recommended)\)//I' | sed -E 's/^"|"$//g' | xargs)
              if [ -n "$CLEAN_NAME" ]; then
                echo "Adding dynamic exclusion: $CLEAN_NAME"
                EXCLUDE_ARGS+=("-d" "$CLEAN_NAME")
              fi
            fi
          done < patches_list.txt
          
          # Fallback standard exclusions using '-d' (to disable GmsCore/MicroG requirements)
          FALLBACKS=(
            "GmsCore support" "gmscore-support"
            "microg-support" "MicroG support"
            "Custom branding" "custom-branding"
            "Change package name" "change-package-name"
            "Disable Play Store updates" "disable-play-store-updates"
          )
          for item in "${FALLBACKS[@]}"; do
            EXCLUDE_ARGS+=("-d" "$item")
          done
          
          echo "Building YouTube Root (Native Play Services Only)..."
          java -jar tools/cli.jar patch --patches tools/patches.jar "${EXCLUDE_ARGS[@]}" -o YouTube-Root.apk apks/youtube.apk
          
          echo "Building YT Music Root (Native Play Services Only)..."
          java -jar tools/cli.jar patch --patches tools/patches.jar "${EXCLUDE_ARGS[@]}" -o YTMusic-Root.apk apks/ytmusic.apk

      - name: Create Magisk Modules
        run: |
          echo "Building Native Magisk/KernelSU Modules with Stock Alignment..."
          
          build_module() {
              local APP_NAME=$1
              local PKG_NAME=$2
              local APK_FILE=$3       # Patched Root APK
              local STOCK_FILE=$4     # Stock APK (from apks/)
              local ID=$5
              local DIR=$6
              
              mkdir -p "$DIR/META-INF/com/google/android"
              
              # Force KernelSU/Magisk internal zip extractor
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/update-binary"
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/updater-script"
              
              cp "$APK_FILE" "$DIR/app.apk"
              cp "$STOCK_FILE" "$DIR/stock.apk"
              
              # Module info
              cat << EOF > "$DIR/module.prop"
          id=$ID
          name=$APP_NAME Morphe (Native Root)
          version=1.0.0
          versionCode=${{ github.run_number }}
          author=${{ github.actor }}
          description=Systemless bind-mount module for Morphe patched $APP_NAME. Natively uses device Google Play Services.
          EOF
              
              # customize.sh (Handles auto-installation of matching Stock APK to prevent Split APK crashes)
              cat << EOF > "$DIR/customize.sh"
          #!/system/bin/sh
          SKIPUNZIP=0
          
          ui_print "- Installing $APP_NAME Morphe Module..."
          
          # Check if custom recovery is used
          if [ -z "\$(pgrep system_server)" ] || [ -z "\$(getprop sys.boot_completed)" ]; then
              ui_print "- WARNING: Flashing in Custom Recovery."
              ui_print "- Cannot auto-install Stock APK in Recovery mode."
              ui_print "- Please make sure the matching stock version is installed manually!"
          else
              ui_print "- Installing/Updating matching stock $APP_NAME..."
              if [ -f "\$MODPATH/stock.apk" ]; then
                  APK_SIZE=\$(stat -c %s "\$MODPATH/stock.apk")
                  # Stream the APK into package manager to bypass any file permission restrictions
                  cat "\$MODPATH/stock.apk" | pm install -r -d -S \$APK_SIZE >/dev/null 2>&1
                  ui_print "- Stock APK successfully installed & aligned."
              else
                  ui_print "- ERROR: stock.apk not found!"
              fi
          fi
          EOF
              
              # service.sh (Checks app presence, auto-installs stock fallback, and bind-mounts)
              cat << EOF > "$DIR/service.sh"
          #!/system/bin/sh
          MODDIR=\${0%/*}
          PKG="$PKG_NAME"
          
          # Wait for device to complete booting
          while [ "\$(getprop sys.boot_completed)" != "1" ]; do
              sleep 3
          done
          
          # Wait for decrypted storage
          while [ ! -d "/sdcard/Android" ]; do
              sleep 2
          done
          
          # Short stabilization delay
          sleep 5
          
          # Locate official app path
          TARGET_PATH=\$(pm path "\$PKG" | head -n 1 | cut -d':' -f2)
          
          # Fallback: If missing, auto-install stock APK from module using streaming method
          if [ -z "\$TARGET_PATH" ] && [ -f "\$MODDIR/stock.apk" ]; then
              APK_SIZE=\$(stat -c %s "\$MODDIR/stock.apk")
              cat "\$MODDIR/stock.apk" | pm install -r -S \$APK_SIZE >/dev/null 2>&1
              sleep 5
              TARGET_PATH=\$(pm path "\$PKG" | head -n 1 | cut -d':' -f2)
          fi
          
          if [ -n "\$TARGET_PATH" ] && [ -f "\$TARGET_PATH" ]; then
              mount -o bind "\$MODDIR/app.apk" "\$TARGET_PATH"
              chcon u:object_r:apk_data_file:s0 "\$TARGET_PATH" 2>/dev/null
              am force-stop "\$PKG" 2>/dev/null
          else
              # Fallback to directory scan
              for path in /data/app/*/\$PKG-*/base.apk /data/app/\$PKG-*/base.apk; do
                  if [ -f "\$path" ]; then 
                      mount -o bind "\$MODDIR/app.apk" "\$path"
                      chcon u:object_r:apk_data_file:s0 "\$path" 2>/dev/null
                      am force-stop "\$PKG" 2>/dev/null
                      break
                  fi
              done
          fi
          EOF
          
              # uninstall.sh
              cat << EOF > "$DIR/uninstall.sh"
          #!/system/bin/sh
          # Mounts are automatically cleared upon rebooting.
          EOF
              
              chmod 755 "$DIR/customize.sh" "$DIR/service.sh" "$DIR/uninstall.sh"
              cd "$DIR"
              zip -r9 "../$ID.zip" .
              cd ..
          }
          
          build_module "YouTube" "com.google.android.youtube" "YouTube-Root.apk" "apks/youtube.apk" "morphe.yt" "yt-magisk"
          build_module "YT Music" "com.google.android.apps.youtube.music" "YTMusic-Root.apk" "apks/ytmusic.apk" "morphe.ytm" "ytm-magisk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          files: |
            *.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
