name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download Morphe Tools
        run: |
          mkdir -p tools
          
          # Exact requested CLI and Patches versions
          echo "Downloading Morphe CLI v1.9.1..."
          wget -qO tools/cli.jar "https://github.com/MorpheApp/morphe-cli/releases/download/v1.9.1/morphe-cli-1.9.1-all.jar"
          
          echo "Downloading Morphe Patches v1.32.0..."
          wget -qO tools/patches.jar "https://github.com/MorpheApp/morphe-patches/releases/download/v1.32.0/patches-1.32.0.mpp"
          
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Requested Morphe tools are empty!"
            exit 1
          fi
          echo "Morphe Tools verified successfully!"

      - name: Download Original APKs
        run: |
          mkdir -p apks
          
          echo "Fetching APK directory from Archive.org (jhc-apks)..."
          curl -sL "https://archive.org/metadata/jhc-apks" > jhc_metadata.json
          
          # Fetch distinct paths for arm64-v8a and armeabi-v7a
          YT_PATH_64=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*-arm64-v8a\.apk$' | sort -V | tail -n 1)
          YT_PATH_32=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*-armeabi-v7a\.apk$' | sort -V | tail -n 1)
          
          YTM_PATH_64=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*-arm64-v8a\.apk$' | sort -V | tail -n 1)
          YTM_PATH_32=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*-armeabi-v7a\.apk$' | sort -V | tail -n 1)
          
          if [ -z "$YT_PATH_64" ] || [ -z "$YT_PATH_32" ]; then echo "Error: YouTube APKs not found!"; exit 1; fi
          if [ -z "$YTM_PATH_64" ] || [ -z "$YTM_PATH_32" ]; then echo "Error: YT Music APKs not found!"; exit 1; fi
          
          # Dynamic Version Extraction
          YT_VER=$(basename "$YT_PATH_64" | sed -E 's/com\.google\.android\.youtube-([0-9.]+)-.*/\1/')
          YTM_VER=$(basename "$YTM_PATH_64" | sed -E 's/com\.google\.android\.apps\.youtube\.music-([0-9.]+)-.*/\1/')
          
          echo "YT_VERSION=$YT_VER" >> $GITHUB_ENV
          echo "YTM_VERSION=$YTM_VER" >> $GITHUB_ENV
          
          echo "Downloading YouTube APKs..."
          curl -sL "https://archive.org/download/jhc-apks/$YT_PATH_64" -o apks/youtube_64.apk
          curl -sL "https://archive.org/download/jhc-apks/$YT_PATH_32" -o apks/youtube_32.apk
          
          echo "Downloading YT Music APKs..."
          curl -sL "https://archive.org/download/jhc-apks/$YTM_PATH_64" -o apks/ytmusic_64.apk
          curl -sL "https://archive.org/download/jhc-apks/$YTM_PATH_32" -o apks/ytmusic_32.apk
          
          # Integrity checks
          if [ ! -s apks/youtube_64.apk ] || [ ! -s apks/ytmusic_64.apk ]; then
            echo "Error: Failed to download 64-bit APKs!"
            exit 1
          fi

      - name: Build Non-Root APKs
        run: |
          # 1. YouTube Non-Root (arm64-v8a and arm-v7a)
          echo "Building YouTube Non-Root arm64-v8a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar -o YouTube-v$YT_VERSION-arm64-v8a-NonRoot.apk apks/youtube_64.apk
          
          echo "Building YouTube Non-Root arm-v7a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar -o YouTube-v$YT_VERSION-arm-v7a-NonRoot.apk apks/youtube_32.apk
          
          # 2. YT Music Non-Root (arm64-v8a and arm-v7a)
          echo "Building YT Music Non-Root arm64-v8a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar -o yt-music-v$YTM_VERSION-arm64-v8a-NonRoot.apk apks/ytmusic_64.apk
          
          echo "Building YT Music Non-Root arm-v7a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar -o yt-music-v$YTM_VERSION-arm-v7a-NonRoot.apk apks/ytmusic_32.apk

      - name: Build Root APKs (For Magisk)
        run: |
          # Declare a Bash array for dynamic exclude arguments
          declare -a YT_ARGS=()
          declare -a YTM_ARGS=()
          
          echo "Scanning patches to dynamically exclude GmsCore/MicroG/Custom Package related patches..."
          
          # Failsafe Patch Listing (tries multiple parameters to never exit with code 2)
          if ! java -jar tools/cli.jar list-patches --patches tools/patches.jar > patches_list.txt 2>/dev/null; then
            if ! java -jar tools/cli.jar list-patches -p tools/patches.jar > patches_list.txt 2>/dev/null; then
              java -jar tools/cli.jar list-patches -b tools/patches.jar > patches_list.txt 2>/dev/null || echo "list-patches failed" > patches_list.txt
            fi
          fi
          
          # Helper function to safely add fallback exclusions ONLY if they exist in the patch bundle
          safe_add_exclude() {
              local patch_name=$1
              declare -n ret_array=$2
              if grep -qi "$patch_name" patches_list.txt; then
                  ret_array+=("-d" "$patch_name")
              fi
          }
          
          # Dynamic exclusion parser based on strict package name compatibility (EXCLUDES CUSTOM BRANDING filter to keep MORPHE custom icon)
          get_exclusions() {
              local target_pkg=$1
              declare -n ret_array=$2
              local current_patch=""
              local is_compatible=false
              
              while IFS= read -r line; do
                  if echo "$line" | grep -q "^Name: "; then
                      current_patch=$(echo "$line" | sed -E 's/^(INFO: |Name: |- |Patch: |  Name: )//I' | sed -E 's/ \((experimental|recommended)\)//I' | sed -E 's/^"|"$//g' | xargs)
                      is_compatible=false
                  fi
                  if echo "$line" | grep -q "Compatible packages:"; then
                      if echo "$line" | grep -q "$target_pkg"; then
                          is_compatible=true
                      fi
                  fi
                  if [ "$is_compatible" = true ] && [ -n "$current_patch" ]; then
                      # Explicitly excludes "custom branding" from matching keywords to keep Morphe icons
                      if echo "$current_patch" | grep -qiE "gmscore|microg|package name|custom package|gms|certificate spoof"; then
                          ret_array+=("-d" "$current_patch")
                          current_patch=""
                      fi
                  fi
              done < patches_list.txt
          }
          
          # 1. Gather isolated YouTube exclusions (Custom branding is kept)
          get_exclusions "com.google.android.youtube" YT_ARGS
          YT_FALLBACKS=(
            "GmsCore support" "gmscore-support"
            "microg-support" "MicroG support"
            "Change package name" "change-package-name"
            "Package name of YouTube"
            "Disable Play Store updates" "disable-play-store-updates"
          )
          for item in "${YT_FALLBACKS[@]}"; do
            safe_add_exclude "$item" YT_ARGS
          done
          
          # 2. Gather isolated YouTube Music exclusions (Custom branding is kept)
          get_exclusions "com.google.android.apps.youtube.music" YTM_ARGS
          YTM_FALLBACKS=(
            "GmsCore support" "gmscore-support"
            "microg-support" "MicroG support"
            "Custom package name" "custom-package-name"
            "Change package name" "change-package-name"
            "Certificate spoof" "certificate-spoof"
            "Disable Play Store updates" "disable-play-store-updates"
          )
          for item in "${YTM_FALLBACKS[@]}"; do
            safe_add_exclude "$item" YTM_ARGS
          done
          
          echo "Building YouTube Root (Native Play Services Only)..."
          java -jar tools/cli.jar patch --patches tools/patches.jar "${YT_ARGS[@]}" -o YouTube-Root.apk apks/youtube_64.apk
          
          echo "Building YT Music Root (Native Play Services Only)..."
          java -jar tools/cli.jar patch --patches tools/patches.jar "${YTM_ARGS[@]}" -o YTMusic-Root.apk apks/ytmusic_64.apk

      - name: Create Magisk Modules
        env:
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Building Native Magisk/KernelSU Modules with Stock Alignment..."
          
          build_module() {
              local APP_NAME=$1
              local PKG_NAME=$2
              local APK_FILE=$3       # Patched Root APK (arm64-v8a)
              local STOCK_FILE=$4     # Stock APK (arm64-v8a)
              local ID=$5
              local DIR=$6
              local OUT_ZIP=$7        # Explicit Zip File Name
              
              mkdir -p "$DIR/META-INF/com/google/android"
              
              # Force KernelSU/Magisk internal zip extractor
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/update-binary"
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/updater-script"
              
              cp "$APK_FILE" "$DIR/app.apk"
              cp "$STOCK_FILE" "$DIR/stock.apk"
              
              # Module info (Safely accessed via bash environment variables)
              cat << EOF > "$DIR/module.prop"
          id=$ID
          name=$APP_NAME Morphe (Native Root)
          version=1.0.0
          versionCode=$RUN_NUMBER
          author=$ACTOR
          description=Systemless bind-mount module for Morphe patched $APP_NAME. Natively uses device Google Play Services.
          EOF
              
              # customize.sh (Handles auto-installation of matching Stock APK to prevent Split APK crashes)
              cat << EOF > "$DIR/customize.sh"
          #!/system/bin/sh
          SKIPUNZIP=0
          
          ui_print "- Installing $APP_NAME Morphe Module..."
          
          if [ -z "\$(pgrep system_server)" ] || [ -z "\$(getprop sys.boot_completed)" ]; then
              ui_print "- WARNING: Flashing in Custom Recovery."
              ui_print "- Cannot auto-install Stock APK in Recovery mode."
              ui_print "- Please make sure the matching stock version is installed manually!"
          else
              ui_print "- Installing/Updating matching stock $APP_NAME..."
              if [ -f "\$MODPATH/stock.apk" ]; then
                  APK_SIZE=\$(stat -c %s "\$MODPATH/stock.apk")
                  cat "\$MODPATH/stock.apk" | pm install -r -d -S \$APK_SIZE >/dev/null 2>&1
                  ui_print "- Stock APK successfully installed & aligned."
              else
                  ui_print "- ERROR: stock.apk not found!"
              fi
          fi
          EOF
              
              # service.sh (Checks app presence, auto-installs stock fallback, and bind-mounts)
              cat << EOF > "$DIR/service.sh"
          #!/system/bin/sh
          MODDIR=\${0%/*}
          PKG="$PKG_NAME"
          
          while [ "\$(getprop sys.boot_completed)" != "1" ]; do
              sleep 3
          done
          
          while [ ! -d "/sdcard/Android" ]; do
              sleep 2
          done
          
          sleep 5
          
          TARGET_PATH=\$(pm path "\$PKG" | head -n 1 | cut -d':' -f2)
          
          if [ -z "\$TARGET_PATH" ] && [ -f "\$MODDIR/stock.apk" ]; then
              APK_SIZE=\$(stat -c %s "\$MODDIR/stock.apk")
              cat "\$MODDIR/stock.apk" | pm install -r -S \$APK_SIZE >/dev/null 2>&1
              sleep 5
              TARGET_PATH=\$(pm path "\$PKG" | head -n 1 | cut -d':' -f2)
          fi
          
          if [ -n "\$TARGET_PATH" ] && [ -f "\$TARGET_PATH" ]; then
              mount -o bind "\$MODDIR/app.apk" "\$TARGET_PATH"
              chcon u:object_r:apk_data_file:s0 "\$TARGET_PATH" 2>/dev/null
              am force-stop "\$PKG" 2>/dev/null
          else
              for path in /data/app/*/\$PKG-*/base.apk /data/app/\$PKG-*/base.apk; do
                  if [ -f "\$path" ]; then 
                      mount -o bind "\$MODDIR/app.apk" "\$path"
                      chcon u:object_r:apk_data_file:s0 "\$path" 2>/dev/null
                      am force-stop "\$PKG" 2>/dev/null
                      break
                  fi
              done
          fi
          EOF
          
              # uninstall.sh
              cat << EOF > "$DIR/uninstall.sh"
          #!/system/bin/sh
          EOF
              
              chmod 755 "$DIR/customize.sh" "$DIR/service.sh" "$DIR/uninstall.sh"
              cd "$DIR"
              zip -r9 "../$OUT_ZIP" .
              cd ..
          }
          
          build_module "YouTube" "com.google.android.youtube" "YouTube-Root.apk" "apks/youtube_64.apk" "morphe.yt" "yt-magisk" "YouTube-v$YT_VERSION.zip"
          build_module "YT Music" "com.google.android.apps.youtube.music" "YTMusic-Root.apk" "apks/ytmusic_64.apk" "morphe.ytm" "ytm-magisk" "yt-music-v$YTM_VERSION.zip"

      - name: Generate Changelog and Description
        run: |
          cat << EOF > release_notes.txt
New build ke sath 
YouTube: $YT_VERSION (arm-v7a, arm64-v8a)
YouTube music: $YTM_VERSION (arm-v7a, arm64-v8a)

Install MicroG-RE "https://github.com/morpheapp/MicroG-RE/releases" for non-root YouTube and YT Music APKs

Use zygisk-detach "https://github.com/j-hc/zygisk-detach" to detach root Morphe YouTube and YT Music from Play Store

CLI: MorpheApp/morphe-cli-1.9.1-all.jar
Patches: MorpheApp/patches-1.32.0.mpp
Changelog
EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          body_path: release_notes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            YouTube-v*-NonRoot.apk
            yt-music-v*-NonRoot.apk
            YouTube-v*.zip
            yt-music-v*.zip
