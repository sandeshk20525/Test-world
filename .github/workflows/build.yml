name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Fetching Morphe CLI (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest > cli_api.json
          
          # Pehle .jar dhoondho, agar na mile toh koi bhi main asset utha lo
          CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$CLI_URL" ]; then
            CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          echo "Downloading CLI from: $CLI_URL"
          wget -qO tools/cli.jar "$CLI_URL"
          
          echo "Fetching Morphe Patches (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest > patches_api.json
          
          # Smart Search: .jar -> .rvp -> Any other file (except .json)
          PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.rvp" | head -n 1)
          fi
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          if [ -z "$PATCHES_URL" ]; then 
            echo "Error: Is release me developer ne abhi tak koi patch file upload hi nahi ki hai!"
            exit 1
          fi
          
          echo "Downloading Patches from: $PATCHES_URL"
          wget -qO tools/patches.jar "$PATCHES_URL"
          
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Downloaded tools are empty!"; exit 1; 
          fi
          echo "Stable Tools verified successfully!"

      - name: Download Original APKs
        run: |
          mkdir -p apks
          # Archive.org se direct download
          curl -s "https://archive.org/download/jhc-apks/apks/com.google.android.youtube/youtube_v19.16.39.apk" -o apks/youtube.apk
          curl -s "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music/ytmusic_v7.05.51.apk" -o apks/ytmusic.apk
          
      - name: Build Non-Root APKs
        run: |
          # CLI Syntax Fix: Input APK ko 'patch' command ke theek baad rakhna zaruri hai taaki PicoCLI crash na ho
          echo "Building YouTube Non-Root..."
          java -jar tools/cli.jar patch apks/youtube.apk -p tools/patches.jar -o YouTube-NonRoot.apk
          
          echo "Building YT Music Non-Root..."
          java -jar tools/cli.jar patch apks/ytmusic.apk -p tools/patches.jar -o YTMusic-NonRoot.apk

      - name: Build Root APKs (For Magisk)
        run: |
          # 1. Exit Code 2 Fix: Using strict '=' syntax (--exclude=) and placing input apk first.
          # 2. Package Name Fix: Excluding 'custom-package-name' to retain 'com.google.android.youtube'.
          
          echo "Building YouTube Root..."
          java -jar tools/cli.jar patch apks/youtube.apk -p tools/patches.jar -o YouTube-Root.apk \
            --exclude=gmscore-support \
            --exclude=microg-support \
            --exclude=custom-package-name
          
          echo "Building YT Music Root..."
          java -jar tools/cli.jar patch apks/ytmusic.apk -p tools/patches.jar -o YTMusic-Root.apk \
            --exclude=gmscore-support \
            --exclude=microg-support \
            --exclude=custom-package-name

      - name: Create Magisk Modules
        run: |
          # Advanced Universal Magisk Installer (With post-fs-data.sh hook)
          mkdir -p template/META-INF/com/google/android
          touch template/META-INF/com/google/android/updater-script
          
          cat << 'EOF' > template/META-INF/com/google/android/update-binary
          #!/system/bin/sh
          OUTFD=$2
          ZIPFILE=$3
          ui_print() { echo -n -e "ui_print $1\n" >&$OUTFD; echo -n -e "ui_print\n" >&$OUTFD; }
          ui_print "- Installing Morphe Root Module..."
          if [ -d "/data/adb/ksu" ]; then MODDIR="/data/adb/ksu/modules"; elif [ -d "/data/adb/ap" ]; then MODDIR="/data/adb/ap/modules"; else MODDIR="/data/adb/modules"; fi
          MODID=$(grep '^id=' "$ZIPFILE" | head -n1 | cut -d= -f2 | tr -d '\r')
          MODPATH="$MODDIR/$MODID"
          rm -rf "$MODPATH"
          mkdir -p "$MODPATH"
          unzip -o "$ZIPFILE" -x "META-INF/*" -d "$MODPATH" >&2
          chmod -R 755 "$MODPATH"
          find "$MODPATH" -type f -exec chmod 644 {} +
          chmod 755 "$MODPATH/post-fs-data.sh" 2>/dev/null
          ui_print "- Done! Please Reboot."
          exit 0
          EOF
          chmod 755 template/META-INF/com/google/android/update-binary

          # YouTube Root Module Build
          cp -r template yt-magisk
          cp YouTube-Root.apk yt-magisk/YouTube.apk
          echo -e "id=morphe.yt\nname=YouTube Morphe (Root)\nversion=1.0\nauthor=${{ github.actor }}\ndescription=Morphe patched YouTube." > yt-magisk/module.prop
          cat << 'EOF' > yt-magisk/post-fs-data.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          for path in /system/app/YouTube/YouTube.apk /system/product/app/YouTube/YouTube.apk /product/app/YouTube/YouTube.apk /data/app/*YouTube*/base.apk; do
              if [ -f "$path" ]; then mount -o bind "$MODDIR/YouTube.apk" "$path"; fi
          done
          EOF
          chmod 755 yt-magisk/post-fs-data.sh
          cd yt-magisk && zip -r9 ../YouTube-Magisk.zip . && cd ..

          # YT Music Root Module Build
          cp -r template ytm-magisk
          cp YTMusic-Root.apk ytm-magisk/YTMusic.apk
          echo -e "id=morphe.ytm\nname=YT Music Morphe (Root)\nversion=1.0\nauthor=${{ github.actor }}\ndescription=Morphe patched YT Music." > ytm-magisk/module.prop
          cat << 'EOF' > ytm-magisk/post-fs-data.sh
          #!/system/bin/sh
          MODDIR=${0%/*}
          for path in /system/app/YTMusic/YTMusic.apk /system/product/app/YTMusic/YTMusic.apk /product/app/YTMusic/YTMusic.apk /data/app/*Music*/base.apk; do
              if [ -f "$path" ]; then mount -o bind "$MODDIR/YTMusic.apk" "$path"; fi
          done
          EOF
          chmod 755 ytm-magisk/post-fs-data.sh
          cd ytm-magisk && zip -r9 ../YTMusic-Magisk.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          files: |
            *.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
