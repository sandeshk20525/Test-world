name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Download Morphe Tools
        run: |
          mkdir -p tools
          
          # Exact requested CLI and Patches versions
          echo "Downloading Morphe CLI v1.9.1..."
          wget -qO tools/cli.jar "https://github.com/MorpheApp/morphe-cli/releases/download/v1.9.1/morphe-cli-1.9.1-all.jar"
          
          echo "Downloading Morphe Patches v1.32.0..."
          wget -qO tools/patches.jar "https://github.com/MorpheApp/morphe-patches/releases/download/v1.32.0/patches-1.32.0.mpp"
          
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Requested Morphe tools are empty!"
            exit 1
          fi
          echo "Morphe Tools verified successfully!"

      - name: Download Original APKs
        run: |
          mkdir -p apks
          
          echo "Fetching APK directory from Archive.org (jhc-apks)..."
          curl -sL "https://archive.org/metadata/jhc-apks" > jhc_metadata.json
          
          # Fetch latest universal -all.apk paths (with failsafe fallback to standard .apk)
          YT_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*-all\.apk$' | sort -V | tail -n 1)
          if [ -z "$YT_PATH" ]; then
            YT_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*\.apk$' | sort -V | tail -n 1)
          fi
          
          YTM_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*-all\.apk$' | sort -V | tail -n 1)
          if [ -z "$YTM_PATH" ]; then
            YTM_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*\.apk$' | sort -V | tail -n 1)
          fi
          
          if [ -z "$YT_PATH" ] || [ -z "$YTM_PATH" ]; then 
            echo "Error: YouTube or YT Music APKs not found in metadata!"
            exit 1
          fi
          
          # Dynamic Version Extraction
          YT_VER=$(basename "$YT_PATH" | sed -E 's/com\.google\.android\.youtube-([0-9.]+)-.*/\1/')
          YTM_VER=$(basename "$YTM_PATH" | sed -E 's/com\.google\.android\.apps\.youtube\.music-([0-9.]+)-.*/\1/')
          
          echo "YT_VERSION=$YT_VER" >> $GITHUB_ENV
          echo "YTM_VERSION=$YTM_VER" >> $GITHUB_ENV
          
          echo "Downloading YouTube Universal APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YT_PATH" -o apks/youtube_all.apk
          
          echo "Downloading YT Music Universal APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YTM_PATH" -o apks/ytmusic_all.apk
          
          # Integrity checks
          if [ ! -s apks/youtube_all.apk ] || [ ! -s apks/ytmusic_all.apk ]; then
            echo "Error: Failed to download universal APKs!"
            exit 1
          fi

      - name: Build Non-Root APKs
        run: |
          # 1. YouTube Non-Root (Using native --striplibs=<arch> argument with correct '=' sign)
          echo "Building YouTube Non-Root arm64-v8a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar --striplibs=arm64-v8a -o YouTube-v$YT_VERSION-arm64-v8a-NonRoot.apk apks/youtube_all.apk
          
          echo "Building YouTube Non-Root arm-v7a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar --striplibs=armeabi-v7a -o YouTube-v$YT_VERSION-arm-v7a-NonRoot.apk apks/youtube_all.apk
          
          # 2. YT Music Non-Root
          echo "Building YT Music Non-Root arm64-v8a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar --striplibs=arm64-v8a -o yt-music-v$YTM_VERSION-arm64-v8a-NonRoot.apk apks/ytmusic_all.apk
          
          echo "Building YT Music Non-Root arm-v7a..."
          java -jar tools/cli.jar patch --patches tools/patches.jar --striplibs=armeabi-v7a -o yt-music-v$YTM_VERSION-arm-v7a-NonRoot.apk apks/ytmusic_all.apk

      - name: Build Root APKs (For Magisk)
        run: |
          # Declare a Bash array for dynamic exclude arguments
          declare -a YT_ARGS=()
          declare -a YTM_ARGS=()
          
          echo "Scanning patches to dynamically exclude GmsCore/MicroG/Custom Package related patches..."
          
          # Failsafe Patch Listing (tries multiple parameters to never exit with code 2)
          if ! java -jar tools/cli.jar list-patches --patches tools/patches.jar > patches_list.txt 2>/dev/null; then
            if ! java -jar tools/cli.jar list-patches -p tools/patches.jar > patches_list.txt 2>/dev/null; then
              java -jar tools/cli.jar list-patches -b tools/patches.jar > patches_list.txt 2>/dev/null || echo "list-patches failed" > patches_list.txt
            fi
          fi
          
          # Helper function to safely add fallback exclusions ONLY if they exist in the patch bundle
          safe_add_exclude() {
              local patch_name=$1
              declare -n ret_array=$2
              if grep -qi "$patch_name" patches_list.txt; then
                  ret_array+=("-d" "$patch_name")
              fi
          }
          
          # Dynamic exclusion parser based on strict package name compatibility (EXCLUDES CUSTOM BRANDING filter to keep MORPHE custom icon)
          get_exclusions() {
              local target_pkg=$1
              declare -n ret_array=$2
              local current_patch=""
              local is_compatible=false
              
              while IFS= read -r line; do
                  if echo "$line" | grep -q "^Name: "; then
                      current_patch=$(echo "$line" | sed -E 's/^(INFO: |Name: |- |Patch: |  Name: )//I' | sed -E 's/ \((experimental|recommended)\)//I' | sed -E 's/^"|"$//g' | xargs)
                      is_compatible=false
                  fi
                  if echo "$line" | grep -q "Compatible packages:"; then
                      if echo "$line" | grep -q "$target_pkg"; then
                          is_compatible=true
                      fi
                  fi
                  if [ "$is_compatible" = true ] && [ -n "$current_patch" ]; then
                      # Explicitly excludes "custom branding" from matching keywords to keep Morphe icons
                      if echo "$current_patch" | grep -qiE "gmscore|microg|package name|custom package|gms|certificate spoof"; then
                          ret_array+=("-d" "$current_patch")
                          current_patch=""
                      fi
                  fi
              done < patches_list.txt
          }
          
          # 1. Gather isolated YouTube exclusions (Custom branding is kept)
          get_exclusions "com.google.android.youtube" YT_ARGS
          YT_FALLBACKS=(
            "GmsCore support" "gmscore-support"
            "microg-support" "MicroG support"
            "Change package name" "change-package-name"
            "Package name of YouTube"
            "Disable Play Store updates" "disable-play-store-updates"
          )
          for item in "${YT_FALLBACKS[@]}"; do
            safe_add_exclude "$item" YT_ARGS
          done
          
          # 2. Gather isolated YouTube Music exclusions (Custom branding is kept)
          get_exclusions "com.google.android.apps.youtube.music" YTM_ARGS
          YTM_FALLBACKS=(
            "GmsCore support" "gmscore-support"
            "microg-support" "MicroG support"
            "Custom package name" "custom-package-name"
            "Change package name" "change-package-name"
            "Certificate spoof" "certificate-spoof"
            "Disable Play Store updates" "disable-play-store-updates"
          )
          for item in "${YTM_FALLBACKS[@]}"; do
            safe_add_exclude "$item" YTM_ARGS
          done
          
          # Building Root APKs with pure 64-bit libraries (--striplibs=arm64-v8a) to completely bypass compatibility crashes on Android 14+
          echo "Building YouTube Root (Native Play Services Only)..."
          java -jar tools/cli.jar patch --patches tools/patches.jar "${YT_ARGS[@]}" --striplibs=arm64-v8a -o YouTube-Root.apk apks/youtube_all.apk
          
          echo "Building YT Music Root (Native Play Services Only)..."
          java -jar tools/cli.jar patch --patches tools/patches.jar "${YTM_ARGS[@]}" --striplibs=arm64-v8a -o YTMusic-Root.apk apks/ytmusic_all.apk

      - name: Create Magisk Modules
        env:
          RUN_NUMBER: ${{ github.run_number }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "Building Native Magisk/KernelSU Modules with Stock Alignment..."
          
          build_module() {
              local APP_NAME=$1
              local PKG_NAME=$2
              local APK_FILE=$3       # Patched Root APK (arm64-v8a only)
              local STOCK_FILE=$4     # Universal Stock APK
              local ID=$5
              local DIR=$6
              local OUT_ZIP=$7        # Explicit Zip File Name
              
              mkdir -p "$DIR/META-INF/com/google/android"
              
              # Force KernelSU/Magisk internal zip extractor
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/update-binary"
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/updater-script"
              
              cp "$APK_FILE" "$DIR/app.apk"
              cp "$STOCK_FILE" "$DIR/stock.apk"
              
              # Module info (Safely accessed via bash environment variables)
              echo "id=$ID" > "$DIR/module.prop"
              echo "name=$APP_NAME Morphe (Native Root)" >> "$DIR/module.prop"
              echo "version=1.0.0" >> "$DIR/module.prop"
              echo "versionCode=$RUN_NUMBER" >> "$DIR/module.prop"
              echo "author=$ACTOR" >> "$DIR/module.prop"
              echo "description=Systemless bind-mount module for Morphe patched $APP_NAME. Natively uses device Google Play Services." >> "$DIR/module.prop"
              
              # customize.sh (Aligns stock APK version safely by removing conflicting splits while PRESERVING user data!)
              echo "#!/system/bin/sh" > "$DIR/customize.sh"
              echo "SKIPUNZIP=0" >> "$DIR/customize.sh"
              echo "ui_print \"- Installing \$APP_NAME Morphe Module...\"" >> "$DIR/customize.sh"
              echo "if [ -z \"\$(pgrep system_server)\" ] || [ -z \"\$(getprop sys.boot_completed)\" ]; then" >> "$DIR/customize.sh"
              echo "    ui_print \"- WARNING: Flashing in Custom Recovery.\"" >> "$DIR/customize.sh"
              echo "    ui_print \"- Cannot auto-install Stock APK in Recovery mode.\"" >> "$DIR/customize.sh"
              echo "    ui_print \"- Please make sure the matching stock version is installed manually!\"" >> "$DIR/customize.sh"
              echo "else" >> "$DIR/customize.sh"
              echo "    ui_print \"- Safely removing conflicting split APKs (preserving your data/accounts)...\"" >> "$DIR/customize.sh"
              echo "    pm uninstall -k \"$PKG_NAME\" >/dev/null 2>&1" >> "$DIR/customize.sh"
              echo "    ui_print \"- Installing matching stock \$APP_NAME...\"" >> "$DIR/customize.sh"
              echo "    if [ -f \"\$MODPATH/stock.apk\" ]; then" >> "$DIR/customize.sh"
              echo "        pm install -r -d -g \"\$MODPATH/stock.apk\" >/dev/null 2>&1" >> "$DIR/customize.sh"
              echo "        rm -rf /data/app/*/\"$PKG_NAME\"-*/oat 2>/dev/null" >> "$DIR/customize.sh"
              echo "        rm -rf /data/app/\"$PKG_NAME\"-*/oat 2>/dev/null" >> "$DIR/customize.sh"
              echo "        ui_print \"- Stock APK successfully aligned.\"" >> "$DIR/customize.sh"
              echo "    else" >> "$DIR/customize.sh"
              echo "        ui_print \"- ERROR: stock.apk not found!\"" >> "$DIR/customize.sh"
              echo "    fi" >> "$DIR/customize.sh"
              echo "fi" >> "$DIR/customize.sh"
              
              # service.sh (Safely uninstalls conflicting splits on boot fallback if needed, mounts, and clears OAT cache)
              echo "#!/system/bin/sh" > "$DIR/service.sh"
              echo "MODDIR=\${0%/*}" >> "$DIR/service.sh"
              echo "PKG=\"\$PKG_NAME\"" >> "$DIR/service.sh"
              echo "while [ \"\$(getprop sys.boot_completed)\" != \"1\" ]; do sleep 3; done" >> "$DIR/service.sh"
              echo "while [ ! -d \"/sdcard/Android\" ]; do sleep 2; done" >> "$DIR/service.sh"
              echo "sleep 5" >> "$DIR/service.sh"
              
              # Super-Robust manual & PM directory scanner fallback
              echo "TARGET_PATH=\$(pm path \"\$PKG\" | head -n 1 | cut -d':' -f2)" >> "$DIR/service.sh"
              echo "if [ -z \"\$TARGET_PATH\" ] || [ ! -f \"\$TARGET_PATH\" ]; then" >> "$DIR/service.sh"
              echo "    for base in \"base.apk\" \"YouTube.apk\" \"YTMusic.apk\" \"com.google.android.youtube.apk\" \"com.google.android.apps.youtube.music.apk\"; do" >> "$DIR/service.sh"
              echo "        for dir in /data/app /system/app /system/priv-app /system/product/app /product/app /system_ext/app /vendor/app; do" >> "$DIR/service.sh"
              echo "            for path in \"\$dir\"/*\"\$PKG\"*/\"\$base\" \"\$dir\"/*\"YouTube\"*/\"\$base\" \"\$dir\"/*\"Music\"*/\"\$base\"; do" >> "$DIR/service.sh"
              echo "                if [ -f \"\$path\" ]; then" >> "$DIR/service.sh"
              echo "                    TARGET_PATH=\"\$path\"" >> "$DIR/service.sh"
              echo "                    break 3" >> "$DIR/service.sh"
              echo "                fi" >> "$DIR/service.sh"
              echo "            done" >> "$DIR/service.sh"
              echo "        done" >> "$DIR/service.sh"
              echo "    done" >> "$DIR/service.sh"
              echo "fi" >> "$DIR/service.sh"
              
              # If missing, auto-install stock APK safely (preserving data!)
              echo "if [ -z \"\$TARGET_PATH\" ] && [ -f \"\$MODDIR/stock.apk\" ]; then" >> "$DIR/service.sh"
              echo "    pm uninstall -k \"\$PKG\" >/dev/null 2>&1" >> "$DIR/service.sh"
              echo "    pm install -r -d -g \"\$MODDIR/stock.apk\" >/dev/null 2>&1" >> "$DIR/service.sh"
              echo "    sleep 5" >> "$DIR/service.sh"
              echo "    TARGET_PATH=\$(pm path \"\$PKG\" | head -n 1 | cut -d':' -f2)" >> "$DIR/service.sh"
              echo "fi" >> "$DIR/service.sh"
              
              # Mount and reset ART caches to enforce patched class loading
              echo "if [ -n \"\$TARGET_PATH\" ] && [ -f \"\$TARGET_PATH\" ]; then" >> "$DIR/service.sh"
              echo "    mount -o bind \"\$MODDIR/app.apk\" \"\$TARGET_PATH\"" >> "$DIR/service.sh"
              echo "    chcon u:object_r:apk_data_file:s0 \"\$TARGET_PATH\" 2>/dev/null" >> "$DIR/service.sh"
              echo "    rm -rf /data/app/*/\"\$PKG\"-*/oat 2>/dev/null" >> "$DIR/service.sh"
              echo "    rm -rf /data/app/\"\$PKG\"-*/oat 2>/dev/null" >> "$DIR/service.sh"
              echo "    cmd package compile --reset \"\$PKG\" >/dev/null 2>&1" >> "$DIR/service.sh"
              echo "    am force-stop \"\$PKG\" 2>/dev/null" >> "$DIR/service.sh"
              echo "else" >> "$DIR/service.sh"
              echo "    for path in /data/app/*/\$PKG-*/base.apk /data/app/\$PKG-*/base.apk; do" >> "$DIR/service.sh"
              echo "        if [ -f \"\$path\" ]; then" >> "$DIR/service.sh"
              echo "            mount -o bind \"\$MODDIR/app.apk\" \"\$path\"" >> "$DIR/service.sh"
              echo "            chcon u:object_r:apk_data_file:s0 \"\$path\" 2>/dev/null" >> "$DIR/service.sh"
              echo "            rm -rf /data/app/*/\"\$PKG\"-*/oat 2>/dev/null" >> "$DIR/service.sh"
              echo "            rm -rf /data/app/\"\$PKG\"-*/oat 2>/dev/null" >> "$DIR/service.sh"
              echo "            cmd package compile --reset \"\$PKG\" >/dev/null 2>&1" >> "$DIR/service.sh"
              echo "            am force-stop \"\$PKG\" 2>/dev/null" >> "$DIR/service.sh"
              echo "            break" >> "$DIR/service.sh"
              echo "        fi" >> "$DIR/service.sh"
              echo "    done" >> "$DIR/service.sh"
              echo "fi" >> "$DIR/service.sh"
              
              # uninstall.sh (Built safely via echo commands)
              echo "#!/system/bin/sh" > "$DIR/uninstall.sh"
              
              chmod 755 "$DIR/customize.sh" "$DIR/service.sh" "$DIR/uninstall.sh"
              cd "$DIR"
              zip -r9 "../$OUT_ZIP" .
              cd ..
          }
          
          # Module bundles are aligned to 64-bit (youtube_all.apk is treated as standard arm64-v8a fallback)
          build_module "YouTube" "com.google.android.youtube" "YouTube-Root.apk" "apks/youtube_all.apk" "morphe.yt" "yt-magisk" "YouTube-v$YT_VERSION.zip"
          build_module "YT Music" "com.google.android.apps.youtube.music" "YTMusic-Root.apk" "apks/ytmusic_all.apk" "morphe.ytm" "ytm-magisk" "yt-music-v$YTM_VERSION.zip"

      - name: Generate Changelog and Description
        run: |
          # Safely write the release notes file using single-quoted echo commands to prevent parsing errors
          echo 'New build ke sath' > release_notes.txt
          echo 'YouTube: '"$YT_VERSION"' (arm-v7a, arm64-v8a)' >> release_notes.txt
          echo 'YouTube music: '"$YTM_VERSION"' (arm-v7a, arm64-v8a)' >> release_notes.txt
          echo '' >> release_notes.txt
          echo 'Install MicroG-RE "https://github.com/morpheapp/MicroG-RE/releases" for non-root YouTube and YT Music APKs' >> release_notes.txt
          echo '' >> release_notes.txt
          echo 'Use zygisk-detach "https://github.com/j-hc/zygisk-detach" to detach root Morphe YouTube and YT Music from Play Store' >> release_notes.txt
          echo '' >> release_notes.txt
          echo 'CLI: MorpheApp/morphe-cli-1.9.1-all.jar' >> release_notes.txt
          echo 'Patches: MorpheApp/patches-1.32.0.mpp' >> release_notes.txt
          echo 'Changelog' >> release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          body_path: release_notes.txt
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            YouTube-v*-NonRoot.apk
            yt-music-v*-NonRoot.apk
            YouTube-v*.zip
            yt-music-v*.zip
