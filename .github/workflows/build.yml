name: Build Morphe APKs and Magisk Modules

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Download Morphe Tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tools
          
          echo "Fetching Morphe CLI (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-cli/releases/latest > cli_api.json
          
          # Pehle .jar dhoondho, agar na mile toh koi bhi main asset utha lo
          CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$CLI_URL" ]; then
            CLI_URL=$(grep "browser_download_url" cli_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          echo "Downloading CLI from: $CLI_URL"
          wget -qO tools/cli.jar "$CLI_URL"
          
          echo "Fetching Morphe Patches (Latest Stable)..."
          curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/MorpheApp/morphe-patches/releases/latest > patches_api.json
          
          # Smart Search: .jar -> .rvp -> Any other file (except .json)
          PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.jar" | head -n 1)
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep "\.rvp" | head -n 1)
          fi
          if [ -z "$PATCHES_URL" ]; then
            PATCHES_URL=$(grep "browser_download_url" patches_api.json | cut -d '"' -f 4 | grep -v "\.json" | head -n 1)
          fi
          
          if [ -z "$PATCHES_URL" ]; then 
            echo "Error: Is release me developer ne abhi tak koi patch file upload hi nahi ki hai!"
            exit 1
          fi
          
          echo "Downloading Patches from: $PATCHES_URL"
          wget -qO tools/patches.jar "$PATCHES_URL"
          
          if [ ! -s tools/cli.jar ] || [ ! -s tools/patches.jar ]; then 
            echo "Error: Downloaded tools are empty!"; exit 1; 
          fi
          echo "Stable Tools verified successfully!"

      - name: Download Original APKs
        run: |
          mkdir -p apks
          
          echo "Fetching latest APK directory from Archive.org (jhc-apks)..."
          curl -sL "https://archive.org/metadata/jhc-apks" > jhc_metadata.json
          
          YT_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.youtube/.*\.apk$' | sort -V | tail -n 1)
          if [ -z "$YT_PATH" ]; then echo "Error: YouTube APK directory me nahi mila!"; exit 1; fi
          
          YTM_PATH=$(jq -r '.files[].name' jhc_metadata.json | grep 'com.google.android.apps.youtube.music/.*\.apk$' | sort -V | tail -n 1)
          if [ -z "$YTM_PATH" ]; then echo "Error: YT Music APK directory me nahi mila!"; exit 1; fi
          
          echo "Found Latest YouTube: $YT_PATH"
          echo "Found Latest YT Music: $YTM_PATH"
          
          echo "Downloading YouTube APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YT_PATH" -o apks/youtube.apk
          
          echo "Downloading YT Music APK..."
          curl -sL "https://archive.org/download/jhc-apks/$YTM_PATH" -o apks/ytmusic.apk
          
          YT_SIZE=$(stat -c%s "apks/youtube.apk" 2>/dev/null || echo 0)
          echo "Downloaded YouTube Size: $YT_SIZE bytes"
          
          if [ "$YT_SIZE" -lt 10000000 ]; then 
            echo "Error: YouTube APK download failed or file is corrupted!"
            exit 1
          fi
          echo "Original APKs dynamically downloaded successfully!"

      - name: Build Non-Root APKs
        run: |
          echo "Building YouTube Non-Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -o YouTube-NonRoot.apk apks/youtube.apk
          
          echo "Building YT Music Non-Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -o YTMusic-NonRoot.apk apks/ytmusic.apk

      - name: Build Root APKs (For Magisk)
        run: |
          echo "Building YouTube Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -e gmscore-support -e microg-support -e custom-package-name -o YouTube-Root.apk apks/youtube.apk
          
          echo "Building YT Music Root..."
          java -jar tools/cli.jar patch -p tools/patches.jar -e gmscore-support -e microg-support -e custom-package-name -o YTMusic-Root.apk apks/ytmusic.apk

      - name: Create Magisk Modules
        run: |
          echo "Building Ultimate Native Magisk/KernelSU Modules..."
          
          build_module() {
              local APP_NAME=$1
              local PKG_NAME=$2
              local APK_FILE=$3
              local ID=$4
              local DIR=$5
              
              mkdir -p "$DIR/META-INF/com/google/android"
              
              # THE MAGIC FIX: Ye KernelSU ko force karega apna flawless internal extractor use karne ko
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/update-binary"
              echo "#MAGISK" > "$DIR/META-INF/com/google/android/updater-script"
              
              cp "$APK_FILE" "$DIR/app.apk"
              
              # Module info
              cat << EOF > "$DIR/module.prop"
          id=$ID
          name=$APP_NAME Morphe (Native Root)
          version=1.0.0
          versionCode=${{ github.run_number }}
          author=${{ github.actor }}
          description=100% Native KSU/Magisk Module. Automatically uninstalls Play Store updates and seamlessly bind-mounts.
          EOF
              
              # customize.sh (Handles Auto-Downgrade safely)
              cat << EOF > "$DIR/customize.sh"
          #!/system/bin/sh
          SKIPUNZIP=0
          
          ui_print "- Uninstalling Play Store updates for $APP_NAME..."
          pm uninstall "$PKG_NAME" >/dev/null 2>&1 || true
          pm uninstall --user 0 "$PKG_NAME" >/dev/null 2>&1 || true
          
          ui_print "- Permissions applied."
          EOF
              
              # post-fs-data.sh (Perfect Dynamic Mount Script)
              cat << EOF > "$DIR/post-fs-data.sh"
          #!/system/bin/sh
          MODDIR=\${0%/*}
          PKG="$PKG_NAME"
          
          for path in /data/app/*/\$PKG-*/base.apk /data/app/\$PKG-*/base.apk; do
              if [ -f "\$path" ]; then 
                  mount -o bind "\$MODDIR/app.apk" "\$path"
                  chcon u:object_r:apk_data_file:s0 "\$path" 2>/dev/null
              fi
          done
          
          for base in "YouTube.apk" "YTMusic.apk" "base.apk"; do
              for dir in /system/app /system/product/app /product/app /system_ext/app; do
                  path=\$(ls "\$dir"/*\$PKG*/"\$base" 2>/dev/null | head -n 1)
                  if [ -z "\$path" ]; then
                      path=\$(ls "\$dir"/*YouTube*/"\$base" 2>/dev/null | head -n 1)
                  fi
                  if [ -n "\$path" ] && [ -f "\$path" ]; then 
                      mount -o bind "\$MODDIR/app.apk" "\$path"
                      chcon u:object_r:apk_data_file:s0 "\$path" 2>/dev/null
                  fi
              done
          done
          EOF
          
              # uninstall.sh (Cleanup Script)
              cat << EOF > "$DIR/uninstall.sh"
          #!/system/bin/sh
          pm uninstall "$PKG_NAME" >/dev/null 2>&1 || true
          EOF
              
              chmod 755 "$DIR/customize.sh" "$DIR/post-fs-data.sh" "$DIR/uninstall.sh"
              cd "$DIR"
              zip -r9 "../$ID.zip" .
              cd ..
          }
          
          build_module "YouTube" "com.google.android.youtube" "YouTube-Root.apk" "morphe.yt" "yt-magisk"
          build_module "YT Music" "com.google.android.apps.youtube.music" "YTMusic-Root.apk" "morphe.ytm" "ytm-magisk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          files: |
            *.apk
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
